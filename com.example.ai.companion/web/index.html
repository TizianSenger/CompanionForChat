<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Companion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(160deg, #0f0c1a 0%, #1a1a3e 60%, #0d2060 100%);
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }

    canvas { display: block; }

    /* Loading overlay */
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      background: inherit;
      color: #a0c4ff;
      font-size: 16px;
      z-index: 20;
      transition: opacity 0.6s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(160,196,255,.25);
      border-top-color: #a0c4ff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Status bar */
    #status {
      position: fixed; bottom: 8px; left: 0; right: 0;
      text-align: center;
      color: rgba(160,196,255,.55);
      font-size: 11px;
      pointer-events: none;
      z-index: 5;
    }

    /* Hint shown when no model is loaded */
    #no-vrm {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(160,196,255,.65);
      text-align: center;
      pointer-events: none;
      z-index: 5;
    }
    #no-vrm h3 { font-size: 15px; margin-bottom: 6px; }
    #no-vrm p  { font-size: 11px; line-height: 1.6; }

    /* Error overlay */
    #error {
      position: fixed; inset: 0;
      display: none;
      flex-direction: column;
      justify-content: center; align-items: center;
      background: rgba(10,5,20,.9);
      color: #ff8080;
      font-size: 14px;
      text-align: center;
      padding: 24px;
      z-index: 30;
    }
    #error h3 { margin-bottom: 8px; }
    #error p  { font-size: 11px; opacity: .8; line-height: 1.7; }
  </style>

  <!--
    Import map: maps bare specifiers to CDN URLs.
    Requires a browser that supports importmaps (Chrome 89+, Firefox 108+,
    Safari 16.4+, WebKitGTK 2.40+).
    For offline use: download the files, place them in web/, and update paths.
  -->
  <script type="importmap">
  {
    "imports": {
      "three":              "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
      "three/addons/":      "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/",
      "@pixiv/three-vrm":   "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.2/lib/three-vrm.module.js"
    }
  }
  </script>
</head>
<body>

  <div id="loading">
    <div class="spinner"></div>
    <span>Loading AI Companion…</span>
  </div>

  <div id="no-vrm" style="display:none">
    <h3>No VRM Model Loaded</h3>
    <p>Use the toolbar button <strong>Select VRM File</strong><br/>
       to choose a <code>.vrm</code> avatar file.</p>
  </div>

  <div id="status">Ready</div>

  <div id="error">
    <h3>WebGL / Browser Error</h3>
    <p id="error-msg">An error occurred.</p>
    <p style="margin-top:12px;font-size:10px">
      Make sure your Eclipse SWT Browser supports WebGL and ES-module importmaps.<br/>
      Eclipse 2023-09+ with Chromium SWT is recommended.
    </p>
  </div>

  <!-- companion.js is inlined here at runtime by CompanionView.java -->
  <script type="module" src="companion.js"></script>

</body>
</html>
